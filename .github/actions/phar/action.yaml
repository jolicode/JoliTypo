name: "Build the PHAR"
description: "Build the PHAR for the current commit"

runs:
    using: "composite"
    steps:
        - name: Setup Castor
          uses: castor-php/setup-castor@827c7ae1be0bb45e42a6082cad943a2afe0ffd40 # v1.0.0

        - name: Compile PHAR
          run: castor phar:compile
          shell: bash

        - name: Setup PHP
          uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
          with:
              php-version: "8.3"

        - name: Ensure PHAR is OK
          run: build/jolitypo.phar --version
          shell: bash
          working-directory: tools/phar
